<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Estación Ambiental Inteligente de Iquitos: monitoreo en tiempo real de temperatura, humedad, CO, calidad del aire y radiación UV."
    />
    <title>Estación Ambiental — Iquitos</title>
    <script>
      // Aplicar el tema guardado antes del primer render (evita flash)
      try {
        var t = localStorage.getItem('tema');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
